<!DOCTYPE html>
<html>

<head>
    <title>Para ti ❤️</title>

    <style>
        body {
            background-color: #ffccd5;
            font-family: Arial;
            text-align: center;
            padding-top: 100px;
        }

        button {
            padding: 15px;
            font-size: 18px;
        }

        #mensaje {
            margin-top: 20px;
            font-size: 22px;
        }

        #foto {
    opacity: 0;
    transition: opacity 1s;
    display: block;
    margin: 20px auto;
}

.corazon {
    position: fixed;
    bottom: 0;
    color: red;
    font-size: 20px;
    animation: flotar 4s linear forwards;
}

@keyframes flotar {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-100vh);
        opacity: 0;
    }
}
    </style>
</head>

<body>

<h1>Hola preciosa ❤️</h1>

<button onclick="iniciar()">
    ¿Quieres saber algo?
</button>

<img id="foto" src="foto1.jpg" width="250" style="width:250px; height:250px; object-fit:cover; border-radius:15px;display:none">

<audio id="musica" loop>
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<div id="mensaje"></div>

<script>
let mensajes = [
    "Te amo de aquí a Francia 💖",
    "Te amo infinito 🥺",
    "Eres lo mejor que me ha pasado ❤️",
    "No necesito a nadie más que a ti ✨"
];

// lista de fotos
let fotos = [
    "foto1.jpg",
    "foto2.jpg",
    "foto3.jpg",
    "foto4.jpg",
    "foto5.jpg"
];

let indice = 0;

let slideshowIniciado = false;

function iniciar() {
    mostrarMensaje();
    mostrarFoto();

    if (!slideshowIniciado) {
        iniciarSlideshow();
        crearCorazones();
        slideshowIniciado = true;
}

 let musica = document.getElementById("musica");
    musica.play();

    
}

function crearCorazones() {
    setInterval(() => {
        let corazon = document.createElement("div");
        corazon.classList.add("corazon");
        corazon.innerHTML = "❤️";

        corazon.style.left = Math.random() * 100 + "vw";
        corazon.style.fontSize = (Math.random() * 20 + 10) + "px";

        document.body.appendChild(corazon);

        setTimeout(() => {
            corazon.remove();
        }, 4000);

    }, 300);
}
function mostrarMensaje() {
    let random = Math.floor(Math.random() * mensajes.length);
    document.getElementById("mensaje").innerHTML = mensajes[random];
}

function mostrarFoto() {
    let foto = document.getElementById("foto");
    foto.style.display = "block";

setTimeout(() => {
        foto.style.opacity = "1";
    }, 100);
}

// slideshow automático
function iniciarSlideshow() {
    setInterval(() => {
        indice++;
        if (indice >= fotos.length) {
            indice = 0;
        }
        document.getElementById("foto").src = fotos[indice];
    }, 5000);
}
</script>

</body>
</html>
